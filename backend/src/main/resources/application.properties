# Server configuration
server.port=8080

# Database Configuration (H2 In-Memory Database for instant out-of-the-box run)
spring.datasource.url=jdbc:h2:mem:comment_offense_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# To switch back to MySQL, comment out H2 above and uncomment MySQL below:
# spring.datasource.url=jdbc:mysql://localhost:3306/comment_offense_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root123

# Hibernate / JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# AI/NLP API Configurations (Optional external endpoints)
# If provided, the backend will attempt to send text requests to these APIs.
# If blank, the backend falls back to the high-performance local Java Lexicon Engine.
ai.huggingface.token=
ai.huggingface.model-url=https://api-inference.huggingface.co/models/unitary/toxic-bert

# Gemini API configuration
ai.gemini.key=
ai.gemini.model-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
