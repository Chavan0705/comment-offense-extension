# Server Port (Cloud platforms bind to PORT env variable automatically, Spring Boot reads it)
server.port=${PORT:8080}

# Production Database Configuration (MySQL / PostgreSQL / etc.)
# Reads credentials from environment variables injected by cloud providers (Railway, Render, AWS, etc.)
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate DDL in production (safe migration validation)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# AI API Keys injected securely from Cloud environment variables
ai.huggingface.token=${HF_API_TOKEN:}
ai.gemini.key=${GEMINI_API_KEY:}
